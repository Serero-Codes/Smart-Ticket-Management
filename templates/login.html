<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Ticket Management - Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f6f9;
        }

        .login-container{
            width:100%;
            max-width:450px;
            padding:20px;
        }

        .login-card{
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }

        .login-card h1{
            text-align:center;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#666;
            margin-bottom:30px;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        .login-btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            cursor:pointer;
            font-size:16px;
        }

        .login-btn:hover{
            background:#1d4ed8;
        }

        #message{
            text-align:center;
            margin-top:15px;
            font-weight:bold;
        }

        .success{
            color:green;
        }

        .error{
            color:red;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">

        <h1>Smart Ticket Management</h1>
        <p class="subtitle">Employee Login</p>

        <form id="loginForm">

            <div class="input-group">
                <label>Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Enter email"
                    required
                >
            </div>

            <div class="input-group">
                <label>Password</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Enter 4-digit password"
                    maxlength="4"
                    required
                >
            </div>

            <button type="submit" class="login-btn">
                Login
            </button>

            <p id="message"></p>

        </form>

    </div>
</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

    const loginForm = document.getElementById("loginForm");
    const message = document.getElementById("message");

    loginForm.addEventListener("submit", async (e) => {

        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        if (!email || !password) {
            message.className = "error";
            message.textContent = "Please complete all fields";
            return;
        }

        try {

            const response = await fetch("/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            });

            const result = await response.json();

            if (response.ok && result.success) {

                message.className = "success";
                message.textContent = "Login successful";

                // Store logged in user
                localStorage.setItem(
                    "currentUser",
                    JSON.stringify(result)
                );

                setTimeout(() => {
                    window.location.href = "/index";
                }, 1000);

            } else {

                message.className = "error";
                message.textContent =
                    result.message || "Invalid email or password";
            }

        } catch (error) {

            console.error(error);

            message.className = "error";
            message.textContent =
                "Unable to connect to the server";
        }

    });

});

</script>

</body>
</html>
