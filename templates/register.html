<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STMS — Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f0f4fc; --surface: #ffffff; --surface2: #f7f9fe;
            --surface3: #eef2fb; --border: #dde3f0; --border2: #c8d2e8;
            --accent: #2563eb; --accent-dim: rgba(37,99,235,0.08);
            --accent-glow: rgba(37,99,235,0.22);
            --text: #0f172a; --text2: #475569; --muted: #94a3b8;
            --error: #ef4444; --success: #10b981;
        }

        [data-theme="dark"] {
            --bg: #080b12; --surface: #0e1219; --surface2: #141922;
            --surface3: #1a2130; --border: #1e2740; --border2: #253050;
            --accent: #3b82f6; --accent-dim: rgba(59,130,246,0.1);
            --accent-glow: rgba(59,130,246,0.22);
            --text: #e2e8f8; --text2: #8896b3; --muted: #3d4d6a;
            --error: #f87171; --success: #34d399;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 24px;
            transition: background 0.35s ease;
        }

        .page-wrap {
            width: 100%;
            max-width: 520px;
        }

        /* Top bar */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text2);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--accent); }

        /* Theme toggle */
        .theme-toggle {
            width: 44px; height: 24px;
            background: var(--surface3);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            transition: background 0.3s, border-color 0.3s;
        }

        .theme-toggle:hover { border-color: var(--accent); }

        .theme-toggle-knob {
            position: absolute; top: 2px; left: 2px;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
            display: flex; align-items: center; justify-content: center;
            font-size: 9px;
        }

        [data-theme="dark"] .theme-toggle-knob { transform: translateX(20px); }

        /* Brand row */
        .brand-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }

        .logo-box {
            width: 34px; height: 34px;
            background: var(--accent);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 13px; color: #fff;
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        .brand-name {
            font-size: 15px; font-weight: 700; color: var(--text);
        }

        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 24px rgba(15,23,42,0.07), 0 1px 4px rgba(15,23,42,0.04);
            animation: cardIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
            transition: background 0.35s, border-color 0.35s;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card-header { margin-bottom: 32px; }

        .card-header p {
            font-size: 12px; font-weight: 600;
            color: var(--accent);
            text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;
        }

        .card-header h2 {
            font-size: 24px; font-weight: 800;
            color: var(--text); letter-spacing: -0.02em;
        }

        .field { margin-bottom: 18px; }

        .field label {
            display: block; font-size: 12px; font-weight: 600;
            color: var(--text2); margin-bottom: 8px;
        }

        .field input, .field select {
            width: 100%; padding: 12px 15px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px; font-weight: 400;
            outline: none; border-radius: 10px;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            appearance: none; -webkit-appearance: none;
        }

        .field input:focus, .field select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
            background: var(--surface);
        }

        .field input::placeholder { color: var(--muted); }

        .select-wrap { position: relative; }

        .select-wrap::after {
            content: '▾';
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--muted); pointer-events: none; font-size: 12px;
        }

        .field select option { background: var(--surface); }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        .submit-btn {
            width: 100%; padding: 14px;
            background: var(--accent); color: #fff;
            border: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700; font-size: 14px;
            cursor: pointer; border-radius: 10px;
            transition: transform 0.2s cubic-bezier(0.16,1,0.3,1), box-shadow 0.2s, filter 0.2s;
            margin-top: 8px;
            position: relative; overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.12), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px var(--accent-glow);
            filter: brightness(1.07);
        }

        .submit-btn:hover::before { transform: translateX(100%); }
        .submit-btn:active { transform: translateY(0); }

        .flash-msg {
            padding: 12px 16px; font-size: 13px; font-weight: 500;
            margin-bottom: 20px; border-radius: 10px;
        }

        .flash-error {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            color: var(--error);
        }

        .flash-success {
            background: rgba(16,185,129,0.08);
            border: 1px solid rgba(16,185,129,0.2);
            color: var(--success);
        }

        .divider { height: 1px; background: var(--border); margin: 28px 0 22px; }

        .footer-note { text-align: center; font-size: 13px; color: var(--muted); }
        .footer-note a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .footer-note a:hover { opacity: 0.75; }

        /* Field stagger animation */
        .field:nth-child(1) { animation: fieldIn 0.4s cubic-bezier(0.16,1,0.3,1) 0.1s both; }
        .field:nth-child(2) { animation: fieldIn 0.4s cubic-bezier(0.16,1,0.3,1) 0.15s both; }
        .field:nth-child(3) { animation: fieldIn 0.4s cubic-bezier(0.16,1,0.3,1) 0.2s both; }
        .row { animation: fieldIn 0.4s cubic-bezier(0.16,1,0.3,1) 0.1s both; }

        @keyframes fieldIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="page-wrap">
    <div class="top-bar">
        <a href="/login" class="back-link">← Back to login</a>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
            <div class="theme-toggle-knob">
                <span id="themeIcon">☀️</span>
            </div>
        </button>
    </div>

    <div class="brand-row">
        <div class="logo-box">ST</div>
        <span class="brand-name">Smart Tickets</span>
    </div>

    <div class="card">
        <div class="card-header">
            <p>New account</p>
            <h2>Create your profile</h2>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in messages %}
                <div class="flash-msg flash-{{ cat }}">{{ msg }}</div>
            {% endfor %}
        {% endwith %}

        <form method="POST" action="/register">
            <div class="row">
                <div class="field">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="John Doe" required>
                </div>
                <div class="field">
                    <label>Department</label>
                    <div class="select-wrap">
                        <select name="department" required>
                            <option value="">Select department…</option>
                            <option value="IT">IT</option>
                            <option value="HR">HR</option>
                            <option value="Finance">Finance</option>
                            <option value="Operations">Operations</option>
                            <option value="Legal">Legal</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="field">
                <label>Email address</label>
                <input type="email" name="email" placeholder="you@company.com" required>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" name="password" placeholder="Min. 6 characters" minlength="6" required>
            </div>
            <button type="submit" class="submit-btn">Create Account →</button>
        </form>

        <div class="divider"></div>
        <p class="footer-note">Already have an account? <a href="/login">Sign in →</a></p>
    </div>
</div>

<script>
    const html = document.documentElement;
    const toggleBtn = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const saved = localStorage.getItem('stms-theme') || 'light';
    html.setAttribute('data-theme', saved);
    themeIcon.textContent = saved === 'dark' ? '🌙' : '☀️';
    toggleBtn.addEventListener('click', () => {
        const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        html.setAttribute('data-theme', next);
        localStorage.setItem('stms-theme', next);
        themeIcon.textContent = next === 'dark' ? '🌙' : '☀️';
    });
</script>
</body>
</html>
